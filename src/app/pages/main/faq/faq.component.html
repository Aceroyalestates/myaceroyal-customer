<main class="faq-page">
  <div class="faq-page__container">
    <div class="faq-page__header">
      <h1>Frequently Asked Questions</h1>
      <p>Browse common answers, including property-linked FAQs where available.</p>
    </div>

    <div class="faq-toolbar">
      <div class="faq-toolbar__search">
        <input
          nz-input
          [(ngModel)]="search"
          (ngModelChange)="onSearchInput($event)"
          (keyup.enter)="onSearch()"
          placeholder="Search FAQs"
          aria-label="Search FAQs"
        />
      </div>
      <div class="faq-toolbar__actions">
        <button nz-button nzType="default" (click)="clearSearch()" [disabled]="isLoading">Reset</button>
        <button nz-button nzType="primary" (click)="onSearch()" [disabled]="isLoading">Search</button>
      </div>
    </div>

    <div class="faq-surface">
      <nz-spin [nzSpinning]="isLoading">
        <ng-container *ngIf="faqs?.length; else empty">
          <nz-collapse nzBordered="false" class="faq-collapse">
            <nz-collapse-panel *ngFor="let f of faqs" [nzHeader]="f.question" [nzActive]="false">
              <div class="faq-answer">{{ f.answer }}</div>
              <div class="faq-meta">
                <span *ngIf="f.category">Category: {{ f.category }}</span>
                <span *ngIf="getPropertyLabel(f)">Property: {{ getPropertyLabel(f) }}</span>
                <span *ngIf="f.updatedAt || f.updated_at">Updated: {{ (f.updatedAt || f.updated_at) | date:'medium' }}</span>
              </div>
            </nz-collapse-panel>
          </nz-collapse>

          <div class="faq-pagination">
            <nz-pagination
              [nzPageIndex]="page"
              [nzPageSize]="limit"
              [nzTotal]="total"
              [nzShowSizeChanger]="true"
              [nzPageSizeOptions]="[10, 20, 50]"
              [nzResponsive]="true"
              (nzPageIndexChange)="onPageIndexChange($event)"
              (nzPageSizeChange)="onPageSizeChange($event)"
            ></nz-pagination>
          </div>
        </ng-container>

        <ng-template #empty>
          <div class="faq-empty">
            <nz-empty nzNotFoundImage="simple"></nz-empty>
          </div>
        </ng-template>
      </nz-spin>
    </div>
  </div>
</main>
